# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the features branch
  push:
    branches: [ "feature/**" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "test"
  test:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Install JDK to run Java/Kotlin files
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # Create environment files to download dependencies from AWS CodeArtifact
      - name: Rebuild private gradle file and create temporary codeartifact file
        run: |
          mkdir -p ~/.gradle
          echo "${{ secrets.PRIVATE_GRADLE_FILE }}" > ~/.gradle/init.gradle.kts
          echo "Creating temporary file..."
          touch .use-codeartifact
          ls -la

      # Grant permission to access Gradle
      - name: Grant execute permission to Gradle
        run: chmod +x ./gradlew

      # Run all unit tests
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      # Generate Jacoco Report for code coverage
      - name: Generate JaCoCo report
        run: ./gradlew jacocoTestReport

      # Upload a code coverage report to build folder
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/build/reports/jacoco/jacocoTestReport/html

      # Removing all temporary files added for environment purposes
      - name: Remove temporary file
        if: always()    # eseguito anche se i test falliscono
        run: |
          echo "Deleting temporary file..."
          rm -f .use-codeartifact
          rm -f ~/.gradle/init.gradle.kts
          ls -la
